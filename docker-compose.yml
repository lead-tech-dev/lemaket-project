version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sandaga
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/sandaga-media;
      /usr/bin/mc anonymous set download local/sandaga-media;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

  backend:
    image: node:20
    working_dir: /app
    restart: unless-stopped
    command: >
      sh -c "npm install --no-package-lock
      && npm run build
      && node dist/src/main"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: sandaga
      JWT_SECRET: change-me
      JWT_EXPIRES_IN: 3600
      STORAGE_DRIVER: s3
      STORAGE_S3_BUCKET: sandaga-media
      STORAGE_S3_REGION: us-east-1
      STORAGE_S3_ACCESS_KEY_ID: minioadmin
      STORAGE_S3_SECRET_ACCESS_KEY: minioadmin
      STORAGE_S3_ENDPOINT: http://minio:9000
      STORAGE_S3_PUBLIC_URL: http://localhost:9000/sandaga-media
      STORAGE_S3_FORCE_PATH_STYLE: "true"
    depends_on:
      - db
      - minio
    volumes:
      - ./sandaga-backend:/app
      - backend_node_modules:/app/node_modules
      - backend_uploads:/app/uploads
    ports:
      - "3000:3000"

  frontend:
    image: node:20
    working_dir: /app
    restart: unless-stopped
    command: >
      sh -c "npm ci
      && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-changeme}
    depends_on:
      - backend
    volumes:
      - ./sandaga-frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"

volumes:
  db_data:
  pgadmin_data:
  backend_node_modules:
  backend_uploads:
  frontend_node_modules:
  minio_data:
