name: CD Production

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-prod
  cancel-in-progress: false

jobs:
  backend-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sandaga-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sandaga-backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Unit tests
        run: npm run test -- --runInBand

  frontend-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sandaga-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sandaga-frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Unit tests
        env:
          VITE_MAPBOX_TOKEN: test-token
        run: npm run test -- --run

  build-and-push:
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, frontend-unit-tests]
    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image names
        id: meta
        run: |
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "backend_image=ghcr.io/${owner_lc}/sandaga-backend:prod-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${owner_lc}/sandaga-frontend:prod-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_latest=ghcr.io/${owner_lc}/sandaga-backend:latest" >> "$GITHUB_OUTPUT"
          echo "frontend_latest=ghcr.io/${owner_lc}/sandaga-frontend:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./sandaga-backend
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}
            ${{ steps.meta.outputs.backend_latest }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./sandaga-frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_image }}
            ${{ steps.meta.outputs.frontend_latest }}
          build-args: |
            VITE_API_URL=${{ vars.PROD_VITE_API_URL || 'https://api.lemaket.com' }}
            MAPBOX_PUBLIC_KEY=${{ secrets.PROD_VITE_MAPBOX_TOKEN || '' }}

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deployment secrets
        id: preflight
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          if [[ -n "$PROD_SSH_HOST" && -n "$PROD_SSH_USER" && -n "$PROD_SSH_KEY" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Deployment skipped: missing PROD_SSH_HOST, PROD_SSH_USER or PROD_SSH_KEY."
          fi

      - name: Skip deployment (missing secrets)
        if: ${{ steps.preflight.outputs.ready != 'true' }}
        run: echo "No deployment executed for production."

      - name: Setup SSH key
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to production
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build-and-push.outputs.frontend_image }}
          K8S_NAMESPACE: ${{ vars.PROD_K8S_NAMESPACE || 'sandaga-prod' }}
          K8S_MANIFEST_PATH: deploy/k8s/prod/apps.yaml
        run: bash ./scripts/deploy-k8s-prod.sh

      - name: Smoke test production (remote)
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_K8S_BACKEND_NODEPORT: ${{ vars.PROD_K8S_BACKEND_NODEPORT || '32100' }}
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${PROD_SSH_USER}@${PROD_SSH_HOST}" \
            "BASE_URL=http://localhost:${PROD_K8S_BACKEND_NODEPORT} bash -s" < ./scripts/smoke.sh
