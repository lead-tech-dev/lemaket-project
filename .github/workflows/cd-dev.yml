name: CD Dev

on:
  workflow_dispatch:
  push:
    branches: [develop]

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-dev
  cancel-in-progress: true

jobs:
  backend-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sandaga-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sandaga-backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Unit tests
        run: npm run test -- --runInBand

  frontend-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sandaga-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sandaga-frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Unit tests
        env:
          VITE_MAPBOX_TOKEN: test-token
        run: npm run test -- --run

  build-and-push:
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, frontend-unit-tests]
    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image names
        id: meta
        run: |
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "backend_image=ghcr.io/${owner_lc}/sandaga-backend:dev-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${owner_lc}/sandaga-frontend:dev-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_stable=ghcr.io/${owner_lc}/sandaga-backend:dev" >> "$GITHUB_OUTPUT"
          echo "frontend_stable=ghcr.io/${owner_lc}/sandaga-frontend:dev" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./sandaga-backend
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}
            ${{ steps.meta.outputs.backend_stable }}

      - name: Validate dev Mapbox token
        env:
          DEV_MAPBOX_PUBLIC_KEY: ${{ secrets.DEV_VITE_MAPBOX_TOKEN || vars.DEV_VITE_MAPBOX_TOKEN || secrets.VITE_MAPBOX_TOKEN || vars.VITE_MAPBOX_TOKEN || '' }}
        run: |
          if [[ -z "$DEV_MAPBOX_PUBLIC_KEY" ]]; then
            echo "Missing Mapbox token. Define DEV_VITE_MAPBOX_TOKEN (preferred) or VITE_MAPBOX_TOKEN in GitHub Secrets/Variables." >&2
            exit 1
          fi

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./sandaga-frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_image }}
            ${{ steps.meta.outputs.frontend_stable }}
          build-args: |
            VITE_API_URL=${{ vars.DEV_VITE_API_URL || 'https://api-dev.lemaket.com' }}
            MAPBOX_PUBLIC_KEY=${{ secrets.DEV_VITE_MAPBOX_TOKEN || vars.DEV_VITE_MAPBOX_TOKEN || secrets.VITE_MAPBOX_TOKEN || vars.VITE_MAPBOX_TOKEN || '' }}

  deploy-dev:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deployment secrets
        id: preflight
        env:
          DEV_SSH_HOST: ${{ secrets.DEV_SSH_HOST }}
          DEV_SSH_USER: ${{ secrets.DEV_SSH_USER }}
          DEV_SSH_KEY: ${{ secrets.DEV_SSH_KEY }}
        run: |
          if [[ -n "$DEV_SSH_HOST" && -n "$DEV_SSH_USER" && -n "$DEV_SSH_KEY" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Deployment skipped: missing DEV_SSH_HOST, DEV_SSH_USER or DEV_SSH_KEY."
          fi

      - name: Skip deployment (missing secrets)
        if: ${{ steps.preflight.outputs.ready != 'true' }}
        run: echo "No deployment executed for development."

      - name: Setup SSH key
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEV_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to development
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        env:
          DEV_SSH_HOST: ${{ secrets.DEV_SSH_HOST }}
          DEV_SSH_USER: ${{ secrets.DEV_SSH_USER }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build-and-push.outputs.frontend_image }}
          K8S_NAMESPACE: ${{ vars.DEV_K8S_NAMESPACE || 'sandaga-dev' }}
          K8S_MANIFEST_PATH: deploy/k8s/dev/apps.yaml
        run: bash ./scripts/deploy-k8s-dev.sh

      - name: Smoke test development (remote)
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        env:
          DEV_SSH_HOST: ${{ secrets.DEV_SSH_HOST }}
          DEV_SSH_USER: ${{ secrets.DEV_SSH_USER }}
          DEV_K8S_BACKEND_NODEPORT: ${{ vars.DEV_K8S_BACKEND_NODEPORT || '32001' }}
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${DEV_SSH_USER}@${DEV_SSH_HOST}" \
            "BASE_URL=http://localhost:${DEV_K8S_BACKEND_NODEPORT} bash -s" < ./scripts/smoke.sh
