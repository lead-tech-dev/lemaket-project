name: CD Dev

on:
  workflow_dispatch:
  push:
    branches: [develop]

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-dev
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image names
        id: meta
        run: |
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "backend_image=ghcr.io/${owner_lc}/sandaga-backend:dev-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${owner_lc}/sandaga-frontend:dev-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_stable=ghcr.io/${owner_lc}/sandaga-backend:dev" >> "$GITHUB_OUTPUT"
          echo "frontend_stable=ghcr.io/${owner_lc}/sandaga-frontend:dev" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./sandaga-backend
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}
            ${{ steps.meta.outputs.backend_stable }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./sandaga-frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_image }}
            ${{ steps.meta.outputs.frontend_stable }}
          build-args: |
            VITE_API_URL=${{ vars.DEV_VITE_API_URL || 'http://localhost:3000' }}
            MAPBOX_PUBLIC_KEY=${{ secrets.DEV_VITE_MAPBOX_TOKEN || '' }}

  deploy-dev:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deployment secrets
        id: preflight
        env:
          DEV_SSH_HOST: ${{ secrets.DEV_SSH_HOST }}
          DEV_SSH_USER: ${{ secrets.DEV_SSH_USER }}
          DEV_SSH_KEY: ${{ secrets.DEV_SSH_KEY }}
        run: |
          if [[ -n "$DEV_SSH_HOST" && -n "$DEV_SSH_USER" && -n "$DEV_SSH_KEY" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Deployment skipped: missing DEV_SSH_HOST, DEV_SSH_USER or DEV_SSH_KEY."
          fi

      - name: Skip deployment (missing secrets)
        if: ${{ steps.preflight.outputs.ready != 'true' }}
        run: echo "No deployment executed for development."

      - name: Setup SSH key
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEV_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Prepare DEV .env file
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        id: dev_env
        env:
          DEV_ENV_FILE_CONTENT: ${{ secrets.DEV_ENV_FILE }}
        run: |
          if [[ -n "$DEV_ENV_FILE_CONTENT" ]]; then
            printf '%s\n' "$DEV_ENV_FILE_CONTENT" > ./.tmp.dev.env
            chmod 600 ./.tmp.dev.env
            echo "path=./.tmp.dev.env" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to development
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        env:
          DEV_SSH_HOST: ${{ secrets.DEV_SSH_HOST }}
          DEV_SSH_USER: ${{ secrets.DEV_SSH_USER }}
          DEV_APP_DIR: ${{ vars.DEV_APP_DIR || format('/home/{0}/sandaga-dev', secrets.DEV_SSH_USER) }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build-and-push.outputs.frontend_image }}
          DEV_ENV_FILE: ${{ steps.dev_env.outputs.path }}
          DEV_BACKEND_PORT: ${{ vars.DEV_BACKEND_PORT || '3001' }}
          DEV_FRONTEND_PORT: ${{ vars.DEV_FRONTEND_PORT || '8081' }}
        run: bash ./scripts/deploy-dev.sh

      - name: Cleanup temp env file
        if: always()
        run: rm -f ./.tmp.dev.env

      - name: Smoke test development (remote)
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        env:
          DEV_SSH_HOST: ${{ secrets.DEV_SSH_HOST }}
          DEV_SSH_USER: ${{ secrets.DEV_SSH_USER }}
          DEV_BACKEND_PORT: ${{ vars.DEV_BACKEND_PORT || '3001' }}
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${DEV_SSH_USER}@${DEV_SSH_HOST}" \
            "BASE_URL=http://localhost:${DEV_BACKEND_PORT} bash -s" < ./scripts/smoke.sh
