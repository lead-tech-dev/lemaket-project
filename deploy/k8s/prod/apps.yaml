apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandaga-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sandaga-backend
  template:
    metadata:
      labels:
        app: sandaga-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/lead-tech-dev/sandaga-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: sandaga-prod-env
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: sandaga-backend
spec:
  type: NodePort
  selector:
    app: sandaga-backend
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 32100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandaga-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandaga-frontend
  template:
    metadata:
      labels:
        app: sandaga-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/lead-tech-dev/sandaga-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: sandaga-prod-env
---
apiVersion: v1
kind: Service
metadata:
  name: sandaga-frontend
spec:
  type: NodePort
  selector:
    app: sandaga-frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 32180
