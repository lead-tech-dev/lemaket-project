services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-sandaga}
    volumes:
      - db_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/$${STORAGE_S3_BUCKET};
      /usr/bin/mc anonymous set download local/$${STORAGE_S3_BUCKET};
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-sandaga-media}

  backend:
    image: ${BACKEND_IMAGE}
    command: >
      sh -c "npm run start:prod"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      DATABASE_HOST: db
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      DATABASE_NAME: ${DATABASE_NAME:-sandaga}
      DATABASE_SYNCHRONIZE: ${DATABASE_SYNCHRONIZE:-false}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-3600}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-sandaga-media}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-us-east-1}
      STORAGE_S3_ACCESS_KEY_ID: ${STORAGE_S3_ACCESS_KEY_ID:-minioadmin}
      STORAGE_S3_SECRET_ACCESS_KEY: ${STORAGE_S3_SECRET_ACCESS_KEY:-minioadmin}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-http://minio:9000}
      STORAGE_S3_PUBLIC_URL: ${STORAGE_S3_PUBLIC_URL}
      STORAGE_S3_FORCE_PATH_STYLE: ${STORAGE_S3_FORCE_PATH_STYLE:-true}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
      API_PUBLIC_URL: ${API_PUBLIC_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      ZIKOPAY_MOCK_MODE: ${ZIKOPAY_MOCK_MODE:-false}
      ZIKOPAY_API_KEY: ${ZIKOPAY_API_KEY:-}
      ZIKOPAY_API_SECRET: ${ZIKOPAY_API_SECRET:-}
      ZIKOPAY_BASE_URL: ${ZIKOPAY_BASE_URL:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_SMS: ${TWILIO_FROM_SMS:-}
      TWILIO_FROM_WHATSAPP: ${TWILIO_FROM_WHATSAPP:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_AUTOREPLY_ENABLED: ${OPENAI_AUTOREPLY_ENABLED:-true}
      DELIVERY_COMMISSION_RATE: ${DELIVERY_COMMISSION_RATE:-0.05}
      PLATFORM_WALLET_USER_ID: ${PLATFORM_WALLET_USER_ID:-}
    depends_on:
      - db
      - minio
    ports:
      - "${BACKEND_PORT:-3000}:3000"

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  db_data:
  minio_data:
